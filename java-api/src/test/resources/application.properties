# Testconfiguratie — H2 in-memory database (vervangt MySQL tijdens tests)

# ── H2 in-memory database ─────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;NON_KEYWORDS=VALUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ── JPA / Hibernate: laat Hibernate de tabellen aanmaken ──────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ── Flyway uitschakelen voor tests ────────────────────────────
spring.flyway.enabled=false

# ── JSON output ───────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
