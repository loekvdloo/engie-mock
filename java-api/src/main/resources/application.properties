# Applicatie naam
spring.application.name=engie-bericht-api

# Server poort
server.port=8080

# ── MariaDB Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/engie_berichten
spring.datasource.username=engie_user
spring.datasource.password=engie_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway migraties ──────────────────────────────────────────────────────────
# Flyway 10/11 heeft een bekende bug met MariaDB 12.x (wsrep_on variabele weg)
# Hibernate beheert het schema via ddl-auto=update
spring.flyway.enabled=false

# ── Loglevel ──────────────────────────────────────────────────
logging.level.com.engie=DEBUG

# ── JSON output ───────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
