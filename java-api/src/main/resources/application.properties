# Applicatie naam
spring.application.name=engie-bericht-api

# Server poort
server.port=8080

# ── MariaDB Database ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mariadb://localhost:3306/engie_berichten
spring.datasource.username=engie_user
spring.datasource.password=engie_pass
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.open-in-view=false

# ── Flyway migraties ──────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Loglevel ──────────────────────────────────────────────────
logging.level.com.engie=DEBUG

# ── JSON output ───────────────────────────────────────────────
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-dates-as-timestamps=false
